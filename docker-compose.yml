services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: el_porvenir_backend_dev
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env.dev  # ← Usar variables de desarrollo
    depends_on:
      db:
        condition: service_healthy
    stdin_open: true
    tty: true
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/admin/"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: el_porvenir_frontend_dev
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    environment:
      - CHOKIDAR_USEPOLLING=true
    depends_on:
      backend:
        condition: service_started
    stdin_open: true
    tty: true

  db:
    image: postgres:17.9-alpine
    container_name: el_porvenir_db_dev
    env_file:
      - ./backend/.env.dev  # ← Usar variables de desarrollo
    volumes:
      - el_porvenir_postgres_data_dev:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  el_porvenir_postgres_data_dev: